<style>
  /* Keyframes for breathing effect on badges and elements */
  @keyframes breathe {
    0%, 100% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.05);
    }
  }

  .badge, .element {
    animation: breathe 3s infinite;
  }

  /* Keyframes for shimmer effect on skills and project tags */
  @keyframes shimmer {
    0% {
      background-position: -200%;
    }
    100% {
      background-position: 200%;
    }
  }

  .shimmer {
    background: linear-gradient(to right, #f6f7d7 0%, #e1e1e1 20%, #f6f7d7 40%, #f6f7d7 100%);
    background-size: 200%;
    animation: shimmer 1.5s infinite;
  }

  /* Smooth text reveal animations */
  .text-reveal {
    opacity: 0;
    transition: opacity 0.75s ease-in-out;
  }

  .text-reveal.show {
    opacity: 1;
  }

  /* Enhanced gradient animations on buttons */
  @keyframes gradient {
    0% {
      background-position: 0%;
    }
    50% {
      background-position: 100%;
    }
    100% {
      background-position: 0%;
    }
  }

  .gradient-button {
    background: linear-gradient(45deg, #ff6a00, #ee0979);
    background-size: 200% 200%;
    animation: gradient 3s ease infinite;
  }

  /* Particle burst effects on interactions */
  @keyframes particle-burst {
    from {
      opacity: 1;
      transform: scale(1);
    }
    to {
      opacity: 0;
      transform: scale(2);
    }
  }

  .particle {
    animation: particle-burst 0.5s forwards;
  }

  /* Smooth scale and rotate transitions */
  .scale-rotate {
    transition: transform 0.75s ease;
  }

  .scale-rotate:hover {
    transform: scale(1.1) rotate(10deg);
  }

  /* Glowing border animations */
  @keyframes glow {
    0% {
      box-shadow: 0 0 5px rgba(255, 165, 0, 0.6);
    }
    50% {
      box-shadow: 0 0 20px rgba(255, 165, 0, 1);
    }
    100% {
      box-shadow: 0 0 5px rgba(255, 165, 0, 0.6);
    }
  }

  .glow {
    animation: glow 1.5s infinite;
  }

  /* Staggered entrance animations */
  .staggered {
    opacity: 0;
    animation: fadeIn 0.5s forwards;
  }

  @keyframes fadeIn {
    0% {
      opacity: 0;
    }
    100% {
      opacity: 1;
    }
  }

  .staggered:nth-child(1) { animation-delay: 0.1s; }
  .staggered:nth-child(2) { animation-delay: 0.2s; }
  .staggered:nth-child(3) { animation-delay: 0.3s; }
  /* Add more for additional items */
</style>
